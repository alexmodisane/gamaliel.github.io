<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — Gamaliel IT Services Management and Product Software Development Company</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #050505;
    color: #fff;
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    cursor: none;
  }

  /* cursor */
  .cur-dot {
    position: fixed; width: 8px; height: 8px;
    background: #ff2a2a; border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width .15s, height .15s;
  }
  .cur-ring {
    position: fixed; width: 28px; height: 28px;
    border: 1px solid rgba(255,42,42,.4); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
  }
  body:has(a:hover, button:hover, .clickable:hover) .cur-dot { width: 16px; height: 16px; }

  /* noise */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.022'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 900;
  }

  /* grid bg */
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,42,42,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,42,42,0.04) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
  }

  /* radial glow */
  .bg-glow {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(255,42,42,.07) 0%, transparent 65%);
    pointer-events: none;
  }

  /* particles canvas */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

  /* corner brackets */
  .corner { position: fixed; width: 28px; height: 28px; }
  .corner.tl { top: 28px; left: 28px; border-top: 1px solid rgba(255,42,42,.35); border-left: 1px solid rgba(255,42,42,.35); }
  .corner.tr { top: 28px; right: 28px; border-top: 1px solid rgba(255,42,42,.35); border-right: 1px solid rgba(255,42,42,.35); }
  .corner.bl { bottom: 28px; left: 28px; border-bottom: 1px solid rgba(255,42,42,.35); border-left: 1px solid rgba(255,42,42,.35); }
  .corner.br { bottom: 28px; right: 28px; border-bottom: 1px solid rgba(255,42,42,.35); border-right: 1px solid rgba(255,42,42,.35); }

  /* main layout */
  .stage {
    position: relative; z-index: 10;
    height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 24px;
    text-align: center;
    gap: 0;
  }

  /* eyebrow */
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: #ff2a2a;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
    opacity: 0; animation: up .8s ease .1s forwards;
  }
  .eyebrow::before, .eyebrow::after {
    content: ''; width: 24px; height: 1px; background: #ff2a2a;
    display: block;
  }

  /* logo */
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 96px);
    letter-spacing: 6px; line-height: 1; color: #fff;
    margin-bottom: 6px;
    opacity: 0; animation: up .9s ease .25s forwards;
  }
  .logo em { color: #ff2a2a; font-style: normal; }

  .divider {
    width: 56px; height: 1px;
    background: rgba(255,42,42,.45);
    margin: 18px auto 20px;
    opacity: 0; animation: up .8s ease .4s forwards;
  }

  /* headline */
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5.5vw, 64px);
    letter-spacing: 2px; line-height: .97; color: rgba(255,255,255,.88);
    margin-bottom: 10px;
    opacity: 0; animation: up .9s ease .5s forwards;
  }
  .headline .r { color: #ff2a2a; }

  .sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(255,255,255,.3); margin-bottom: 36px;
    opacity: 0; animation: up .8s ease .62s forwards;
  }

  /* countdown */
  .clock {
    display: flex; gap: 6px; align-items: flex-start;
    margin-bottom: 32px;
    opacity: 0; animation: up .9s ease .72s forwards;
  }
  .cu {
    display: flex; flex-direction: column; align-items: center;
  }
  .cn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 7vw, 72px); line-height: 1; color: #fff;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,42,42,.22);
    padding: 8px 16px; min-width: 72px; text-align: center;
    position: relative;
  }
  .cn::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,42,42,.55), transparent);
  }
  .cl {
    font-family: 'DM Mono', monospace;
    font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,.22); margin-top: 6px;
  }
  .cc {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 5vw, 56px);
    color: rgba(255,42,42,.5); line-height: 1; padding-top: 8px;
    animation: blink 1s step-start infinite;
  }

  /* progress */
  .progress-wrap {
    width: min(340px, 90vw); margin-bottom: 28px;
    opacity: 0; animation: up .8s ease .85s forwards;
  }
  .progress-labels {
    display: flex; justify-content: space-between;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,.2); margin-bottom: 8px;
  }
  .progress-track {
    height: 2px; background: rgba(255,255,255,.07);
    position: relative;
  }
  .progress-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, #ff2a2a, rgba(255,42,42,.5));
    width: 0; transition: width 1.6s cubic-bezier(.16,1,.3,1);
  }

  /* notify form */
  .notify-form {
    display: flex; gap: 0; width: min(540px, 90vw); margin-bottom: 14px;
    opacity: 0; animation: up .8s ease .95s forwards;
  }
  .notify-input {
    flex: 1; background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,42,42,.25); border-right: none;
    color: #fff; font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1px; padding: 13px 16px;
    outline: none; transition: border-color .2s;
  }
  .notify-input::placeholder { color: rgba(255,255,255,.2); }
  .notify-input:focus { border-color: rgba(255,42,42,.6); }
  .notify-btn {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    background: #ff2a2a; color: #fff; border: none;
    padding: 13px 22px; cursor: pointer; white-space: nowrap;
    transition: opacity .2s;
  }
  .notify-btn:hover { opacity: .82; }
  .notify-btn:disabled { opacity: .45; cursor: default; }

  .notify-confirm {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase;
    min-height: 16px; margin-bottom: 28px;
    opacity: 0; animation: fadeIn .5s ease .95s forwards;
    transition: opacity .4s ease, color .3s ease;
  }

  /* nav links */
  .nav-links {
    display: flex; gap: 28px;
    opacity: 0; animation: up .8s ease 1.05s forwards;
  }
  .nav-link {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,.25); text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color .2s, border-color .2s; padding-bottom: 2px;
  }
  .nav-link:hover { color: rgba(255,255,255,.7); border-color: rgba(255,42,42,.4); }

  /* footer */
  .foot {
    position: fixed; bottom: 18px; left: 0; right: 0;
    display: flex; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,.1);
    opacity: 0; animation: fadeIn .8s ease 1.2s forwards;
    z-index: 10;
  }

  /* scan line */
  .scan {
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,42,42,.12), transparent);
    animation: scan 8s linear infinite; pointer-events: none; z-index: 5;
  }

  @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  @keyframes scan { from{top:-2px} to{top:100vh} }

  /* mobile */
  @media(max-width:480px){
    .clock { gap: 4px; }
    .cn { min-width: 54px; padding: 6px 10px; }
    .corner { display: none; }
  }
</style>
</head>
<body>

<div class="cur-dot" id="curDot"></div>
<div class="cur-ring" id="curRing"></div>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<canvas id="particles"></canvas>
<div class="scan"></div>

<span class="corner tl"></span>
<span class="corner tr"></span>
<span class="corner bl"></span>
<span class="corner br"></span>

<main class="stage">

  <p class="eyebrow">GAMALIEL Solutions (Pty) Ltd</p>

  <h2 class="logo">GAMA<em>LIEL</em></h2>
  <div class="divider"></div>

  <h1 class="headline">
    SOMETHING <span class="r">POWERFUL</span><br>IS COMING
  </h1>
  <p class="sub">Software Product Development Division — Launching Soon</p>

  <!-- Countdown -->
  <div class="clock">
    <div class="cu"><div class="cn" id="days">00</div><div class="cl">Days</div></div>
    <div class="cc">:</div>
    <div class="cu"><div class="cn" id="hrs">00</div><div class="cl">Hours</div></div>
    <div class="cc">:</div>
    <div class="cu"><div class="cn" id="mins">00</div><div class="cl">Mins</div></div>
    <div class="cc">:</div>
    <div class="cu"><div class="cn" id="secs">00</div><div class="cl">Secs</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-labels">
      <span>Build progress</span>
      <span id="pct-lbl">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="pFill"></div>
    </div>
  </div>

  <!-- Email form -->
  <div class="notify-form">
    <input class="notify-input" id="nameInput" type="text" placeholder="Your name" style="border-right:none;border-bottom:1px solid rgba(255,42,42,.25);flex:0 0 140px;">
    <input class="notify-input" id="emailInput" type="email" placeholder="Your email address">
    <button class="notify-btn" id="notifyBtn" onclick="handleNotify()">Notify Me</button>
  </div>
  <!-- honeypot anti-spam — hidden from real users -->
  <input type="text" id="_hp" name="_hp" tabindex="-1" autocomplete="off"
    style="position:absolute;left:-9999px;opacity:0;pointer-events:none;">
  <div class="notify-confirm" id="notifyConfirm">&nbsp;</div>

 

</main>

<footer class="foot">© 2026 GAMALIEL SOLUTIONS (PTY) LTD — ALL RIGHTS RESERVED</footer>

<script>
/* ── CURSOR ── */
const dot = document.getElementById('curDot');
const ring = document.getElementById('curRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  dot.style.left=mx+'px'; dot.style.top=my+'px';
});
(function loop(){ rx+=(mx-rx)*.1; ry+=(my-ry)*.1; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();

/* ── COUNTDOWN ── */
const LAUNCH = new Date('2026-06-01T09:00:00');
function pad(n){ return String(Math.max(0,n)).padStart(2,'0'); }
function tick(){
  const diff = LAUNCH - Date.now();
  if(diff <= 0){ ['days','hrs','mins','secs'].forEach(id=>document.getElementById(id).textContent='00'); return; }
  document.getElementById('days').textContent = pad(Math.floor(diff/86400000));
  document.getElementById('hrs').textContent  = pad(Math.floor((diff%86400000)/3600000));
  document.getElementById('mins').textContent = pad(Math.floor((diff%3600000)/60000));
  document.getElementById('secs').textContent = pad(Math.floor((diff%60000)/1000));
}
tick(); setInterval(tick,1000);

/* ── PROGRESS BAR ── */
const TARGET_PCT = 73;
setTimeout(()=>{
  const fill = document.getElementById('pFill');
  const lbl  = document.getElementById('pct-lbl');
  fill.style.width = TARGET_PCT + '%';
  let v = 0;
  const iv = setInterval(()=>{
    v++;
    lbl.textContent = v + '%';
    if(v >= TARGET_PCT) clearInterval(iv);
  }, 22);
}, 600);


const EMAILJS_PUBLIC_KEY  = 'service_773hgbn';   // e.g. 'abc123XYZdef'
const EMAILJS_SERVICE_ID  = 'service_773hgbn';   // e.g. 'service_xxxxxx'
const EMAILJS_TEMPLATE_ID = 'template_7yi5zii';  // e.g. 'template_xxxxxx'

/* ─── Initialise EmailJS ─────────────────────── */
(function initEmailJS(){
  const sdk = document.createElement('script');
  sdk.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
  sdk.onload = () => {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    console.log('[GAMALIEL] EmailJS ready');
  };
  document.head.appendChild(sdk);
})();

/* ─── Validation helpers ─────────────────────── */
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

function showMsg(text, type) {
  const el = document.getElementById('notifyConfirm');
  el.textContent = text;
  el.style.color   = type === 'success' ? '#22c55e' : '#ff2a2a';
  el.style.opacity = '1';
  if (type === 'success') {
    setTimeout(() => { el.style.opacity = '0'; }, 6000);
  }
}

/* ─── Main handler ───────────────────────────── */
async function handleNotify() {
  const nameEl  = document.getElementById('nameInput');
  const emailEl = document.getElementById('emailInput');
  const btn     = document.getElementById('notifyBtn');

  const name  = nameEl.value.trim();
  const email = emailEl.value.trim();

  /* client-side validation */
  if (!name) {
    showMsg('⚠  Please enter your name.', 'error');
    nameEl.focus();
    return;
  }
  if (!EMAIL_RE.test(email)) {
    showMsg('⚠  Please enter a valid email address.', 'error');
    emailEl.focus();
    return;
  }

  /* honeypot check (future-proof) */
  const hp = document.getElementById('_hp');
  if (hp && hp.value !== '') return;

  /* disable button + show spinner */
  btn.disabled    = true;
  btn.textContent = 'Sending...';

  /* build template params */
  const params = {
    subscriber_name:  name,
    subscriber_email: email,
    registered_at: new Date().toLocaleString('en-ZA', {
      dateStyle: 'full', timeStyle: 'short',
      timeZone: 'Africa/Johannesburg'
    }),
    page: 'GAMALIEL — Coming Soon',
    reply_to: email
  };

  try {
    const result = await emailjs.send(
      EMAILJS_SERVICE_ID,
      EMAILJS_TEMPLATE_ID,
      params
    );

    if (result.status === 200) {
      nameEl.value  = '';
      emailEl.value = '';
      btn.textContent  = 'Registered ✓';
      btn.style.background = '#0a0a0a';
      btn.style.color      = '#22c55e';
      btn.style.border     = '1px solid rgba(34,197,94,.35)';
      showMsg("✓  You're on the list. We'll notify you at launch.", 'success');
    } else {
      throw new Error('Status ' + result.status);
    }
  } catch (err) {
    console.error('[GAMALIEL] EmailJS error:', err);
    btn.disabled    = false;
    btn.textContent = 'Retry';
    showMsg('✕  Could not register. Please email us at hello@gamaliel.co.za', 'error');
  }
}

/* ── PARTICLES ── */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, pts = [];

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function mkPt(){
  return {
    x: Math.random()*W, y: Math.random()*H,
    vx:(Math.random()-.5)*.3, vy:-(Math.random()*.4+.1),
    r: Math.random()*1.2+.3,
    a: Math.random()*.4+.05,
    red: Math.random()>.72
  };
}

function init(){ pts=[]; for(let i=0;i<90;i++){ const p=mkPt(); p.y=Math.random()*H; pts.push(p); } }

function draw(){
  ctx.clearRect(0,0,W,H);
  // connections
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){
        ctx.beginPath();
        ctx.strokeStyle=`rgba(255,42,42,${.03*(1-d/100)})`;
        ctx.lineWidth=.4;
        ctx.moveTo(pts[i].x,pts[i].y);
        ctx.lineTo(pts[j].x,pts[j].y);
        ctx.stroke();
      }
    }
  }
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.y<-10) Object.assign(p,mkPt(),{y:H+5});
    if(p.x<0) p.x=W; if(p.x>W) p.x=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.red?`rgba(255,42,42,${p.a})`:`rgba(255,255,255,${p.a*.5})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}

window.addEventListener('resize',()=>{ resize(); init(); });
resize(); init(); draw();
</script>
</body>
</html>
